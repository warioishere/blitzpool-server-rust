name: CI

# Every push to main and every PR runs the full gate set:
#   - fmt / clippy / check       — compile + lint, no infra needed
#   - test                       — the actual suite, with Postgres + Redis
#                                  service containers (see the `test` job).
#
# sqlx::query! macros validate at COMPILE time against the committed .sqlx
# offline cache (SQLX_OFFLINE=true); the live Postgres is only used at RUNTIME
# by the integration tests.
#
# The bitcoin-core regtests (TDP/JDP/mining/block-submit) self-skip here: they
# need the SV2-IPC `bitcoin-node` v31 binary, which GitHub runners don't have
# (`RegtestConfig::is_available()` is false → the test prints "skipping" and
# returns). Those run on a self-hosted runner that has the binary.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  SQLX_OFFLINE: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends capnproto libcapnp-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  check:
    name: cargo check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends capnproto libcapnp-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-targets --locked

  test:
    name: cargo test (Postgres + Redis)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: public_pool
        ports:
          # Host port 15433 = the default the tests connect to
          # (bp-test-support PG_DEFAULT_URL / BP_PG_URL).
          - 15433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: valkey/valkey:8-alpine
        ports:
          # Host port 16379 = the default the tests connect to
          # (bp-test-support REDIS_DEFAULT_URL / BP_REDIS_URL).
          - 16379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends capnproto libcapnp-dev postgresql-client
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Load DB schema + migrations
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -p 15433 -U postgres -d public_pool -v ON_ERROR_STOP=1 -f db/schema.sql
          for f in crates/bp-db/migrations/*.sql; do
            psql -h localhost -p 15433 -U postgres -d public_pool -v ON_ERROR_STOP=1 -f "$f"
          done
      # --test-threads=1: the integration tests share the one Postgres/Redis, so
      # run them serially (matches the local `test-strict` alias). Regtests
      # self-skip (no bitcoin-node here).
      - name: cargo test
        run: cargo test --workspace --all-targets --locked -- --test-threads=1
