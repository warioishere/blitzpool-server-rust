name: CI

# The compile/lint gates (fmt, clippy, check, and the test-BUILD step below)
# run automatically on every push to main and every PR. They need NO infra:
# sqlx::query! macros validate against the committed .sqlx offline cache
# (SQLX_OFFLINE=true), and nothing connects to Postgres/Redis at compile time.
#
# Actually RUNNING the suite needs a local Postgres + Redis (+ bitcoin-node for
# the regtests) that GitHub runners lack, so the test-RUN step stays manual —
# it only fires on a `workflow_dispatch` from the Actions tab.
#
# Why the split matters: `cargo check --all-targets`, `cargo clippy
# --all-targets`, and `cargo test --all-targets --no-run` all COMPILE every
# test target, so a test that stops compiling (e.g. a struct literal missing a
# newly-added field) fails the gate on every push — even though the tests
# themselves can't be executed here. The whole workflow used to be
# workflow_dispatch-only, so exactly such a break once slipped through a
# release unnoticed.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # bp-db uses sqlx::query! macros — they validate against a Postgres schema at compile time.
  # In CI we use the committed .sqlx/ offline cache instead of a live DB. Devs regenerate the
  # cache locally via `cargo sqlx prepare --workspace` against a local PG container (see db/README.md).
  SQLX_OFFLINE: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends capnproto libcapnp-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  check:
    name: cargo check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends capnproto libcapnp-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-targets --locked

  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends capnproto libcapnp-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # GUARD (auto, no infra): compile + link EVERY test binary without running
      # it. This is what catches a test target that stopped compiling.
      - name: Build all test targets (compile guard)
        run: cargo test --workspace --all-targets --no-run --locked
      # Full run (manual only): the integration/regtest suite connects to a local
      # Postgres + Redis (+ bitcoin-node), which GitHub runners don't provide.
      - name: Run full suite (needs Postgres + Redis + bitcoin-node)
        if: github.event_name == 'workflow_dispatch'
        run: cargo test --workspace --all-targets --locked
