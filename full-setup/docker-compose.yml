# blitzpool-rust full stack - single compose file, network selected
# via docker-compose profiles.
#
# Infra (postgres + redis always-on; bitcoin-<net> per profile) plus the
# pool itself, which runs as FOUR processes from one image + one shared
# config, differing only by BLITZPOOL_ROLES:
#
#   blitzpool-core      roles=front          Stratum + producer + block submit + JDP (holds the miners)
#   blitzpool-api       roles=api            read-only HTTP API (charts/admin)
#   blitzpool-payout    roles=payout,stats   accounting ledger + stream consumers + maintenance crons
#   blitzpool-notify    roles=notify         dispatcher + listeners + notification crons
#
# There is no single-process "monolith": the front (core) and the back
# (payout/api/notify) must run as separate processes, so a back-office fix
# redeploys by recreating one container without dropping miners. See
# DEPLOYMENT.md.
#
# Bring up exactly one network at a time:
#
#   docker compose --profile mainnet  up -d --build
#   docker compose --profile regtest  up -d --build
#
# mainnet uses ../.local/blitzpool.toml by default. For testnet4 / regtest,
# point BLITZPOOL_CONFIG at the matching config (mounted to /app/blitzpool.toml):
#
#   BLITZPOOL_CONFIG=blitzpool-testnet4.toml docker compose --profile testnet4 up -d
#   BLITZPOOL_CONFIG=blitzpool-regtest.toml  docker compose --profile regtest  up -d
#
# Deploy a back-office fix with near-zero downtime (build, then swap one):
#
#   docker compose build blitzpool-payout
#   docker compose up -d --no-deps blitzpool-payout
#
# The shared postgres holds one DB per network so switching does NOT
# wipe the other network's state. Default DB name = `blitzpool` for
# new installs; set PG_DATABASE=public_pool in .env when attaching to
# an existing TS-pool DB.

# Shared base for the four pool processes — they differ only by
# BLITZPOOL_ROLES, ports, and RUST_LOG. Enabled in every network profile;
# the mounted config (BLITZPOOL_CONFIG) selects the network.
x-blitzpool-app: &blitzpool-app
  build:
    context: ..
    dockerfile: Dockerfile
  image: blitzpool:latest
  restart: unless-stopped
  stop_grace_period: 30s
  profiles: ["mainnet", "testnet4", "regtest"]
  networks:
    - blitzpool
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "3"
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  # -- always-on backing services -----------------------------------
  postgres:
    container_name: blitzpool-postgres
    image: postgres:18-alpine
    restart: unless-stopped
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - blitzpool
    healthcheck:
      test: ["CMD-SHELL", "cd / && pg_isready -U ${PG_USER:-postgres} -d ${PG_DATABASE:-public_pool}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Tuning copied from the TS-pool production compose. Reasonable
    # defaults for a single-host pool; tune `shared_buffers` / `work_mem`
    # downward on a smaller box.
    command: >
      postgres
      -c max_connections=120
      -c shared_buffers=2GB
      -c effective_cache_size=4GB
      -c work_mem=32MB
      -c maintenance_work_mem=256MB
      -c wal_buffers=16MB
      -c max_wal_size=2GB
      -c min_wal_size=1GB
      -c checkpoint_completion_target=0.9
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c autovacuum_vacuum_scale_factor=0.05
      -c autovacuum_analyze_scale_factor=0.02
      -c autovacuum_vacuum_cost_delay=2ms
      -c idle_in_transaction_session_timeout=30000
      -c log_min_duration_statement=2000
      -c shared_preload_libraries=pg_stat_statements
      -c pg_stat_statements.track=all
      -c statement_timeout=30000
    environment:
      POSTGRES_DB: ${PG_DATABASE:-public_pool}
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-postgres}
    volumes:
      # Mount at /var/lib/postgresql (not /var/lib/postgresql/18/docker)
      # so the postgres:18-alpine image's default PGDATA layout
      # (/var/lib/postgresql/18/docker/) lives entirely inside the
      # mount. This matches the structure the TS pool ships its
      # production PG data in (data/.../pg/18/docker/), enabling a
      # 1:1 cp -a copy without flattening.
      - "./data/postgres:/var/lib/postgresql"
      # Auto-apply the TS-pool schema on first init. postgres:18-alpine
      # runs anything in /docker-entrypoint-initdb.d/ once when the
      # data dir is empty.
      - "../db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro"

  redis:
    container_name: blitzpool-redis
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - blitzpool
    healthcheck:
      # docker 29.5 regression: CMD-form healthchecks fail with "cwd
      # outside container mount namespace root" when the docker
      # client's CWD doesn't exist in the container. Wrap in shell
      # with explicit `cd /` to sidestep it.
      test: ["CMD-SHELL", "cd / && valkey-cli ${REDIS_PASSWORD:+-a \"$$REDIS_PASSWORD\"} ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      valkey-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory ${REDIS_MAX_MEMORY:-4096mb}
      --maxmemory-policy volatile-lru
      --io-threads 2
      --io-threads-do-reads yes
      ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    volumes:
      - "./data/redis:/data"

  # -- bitcoin node, one per network (profile-gated) ----------------
  bitcoin-mainnet:
    profiles: ["mainnet"]
    container_name: blitzpool-bitcoin-mainnet
    build:
      context: ./docker/bitcoin/mainnet
    restart: unless-stopped
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - blitzpool
    # Service-alias `bitcoin` lets blitzpool.toml use a single
    # `url = "http://bitcoin"` across networks.
    hostname: bitcoin
    ports:
      - "127.0.0.1:8332:8332/tcp"
      - "0.0.0.0:8333:8333/tcp"
      - "127.0.0.1:28332:28332/tcp"
    volumes:
      - "./data/bitcoin-mainnet:/app/data"
      - "./docker/bitcoin/mainnet/bitcoin.conf:/app/data/bitcoin.conf:ro"
      - "ipc:/ipc"

  bitcoin-testnet4:
    profiles: ["testnet4"]
    container_name: blitzpool-bitcoin-testnet4
    build:
      context: ./docker/bitcoin/testnet4
    restart: unless-stopped
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - blitzpool
    hostname: bitcoin
    ports:
      - "127.0.0.1:48332:48332/tcp"
      - "0.0.0.0:48333:48333/tcp"
      - "127.0.0.1:38332:28332/tcp"
    volumes:
      - "./data/bitcoin-testnet4:/app/data"
      - "./docker/bitcoin/testnet4/bitcoin.conf:/app/data/bitcoin.conf:ro"
      - "ipc:/ipc"

  bitcoin-regtest:
    profiles: ["regtest"]
    container_name: blitzpool-bitcoin-regtest
    build:
      context: ./docker/bitcoin/regtest
    restart: unless-stopped
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - blitzpool
    hostname: bitcoin
    ports:
      - "127.0.0.1:28443:18443/tcp"
    volumes:
      - "./data/bitcoin-regtest:/app/data"
      - "./docker/bitcoin/regtest/bitcoin.conf:/app/data/bitcoin.conf:ro"
      - "ipc:/ipc"

  # -- pool processes: core / api / payout / notify -----------------
  # Always-on front: holds the miner connections. Only this process needs
  # the bitcoin IPC socket (TDP is front-only). Recreate only to ship a
  # share-path / coinbase-math fix (miners reconnect).
  blitzpool-core:
    <<: *blitzpool-app
    container_name: blitzpool-core
    environment:
      - BLITZPOOL_ROLES=front
      - RUST_LOG=${RUST_LOG:-info,blitzpool=debug,bp_stratum_v1=debug,bp_stratum_v2=debug,bp_template_distribution=debug}
      - RUST_BACKTRACE=1
    ports:
      - "0.0.0.0:3333:3333/tcp"   # solo
      - "0.0.0.0:3339:3339/tcp"   # solo high-diff
      - "0.0.0.0:3340:3340/tcp"   # pplns
      - "0.0.0.0:3349:3349/tcp"   # pplns high-diff
      - "0.0.0.0:3335:3335/tcp"   # sv2
      - "0.0.0.0:3337:3337/tcp"   # jdp
    volumes:
      - "../.local/${BLITZPOOL_CONFIG:-blitzpool.toml}:/app/blitzpool.toml:ro"
      - "./data/blitzpool-logs:/app/logs"
      - "../.local:/app/keys:ro"
      - "ipc:/ipc"

  # Read-only API: charts/admin stay up while payout restarts. No IPC, no
  # stream consumers, no crons. Safe to recreate any time.
  blitzpool-api:
    <<: *blitzpool-app
    container_name: blitzpool-api
    environment:
      - BLITZPOOL_ROLES=api
      - RUST_LOG=${RUST_LOG:-info,blitzpool=debug,bp_api=debug}
      - RUST_BACKTRACE=1
    ports:
      - "0.0.0.0:3334:3334/tcp"        # HTTP API
      - "127.0.0.1:9000:9000/tcp"      # metrics
    volumes:
      - "../.local/${BLITZPOOL_CONFIG:-blitzpool.toml}:/app/blitzpool.toml:ro"
      - "./data/blitzpool-logs:/app/logs"
      - "../.local:/app/keys:ro"

  # Accounting: PPLNS + Group-Solo + Blockparty ledger (block-found ledger
  # apply), confirmation watcher, maintenance crons, statistics. Holds NO
  # dispatcher: notifications are the `notify` process below. Recreate for an
  # accounting/payout fix — miners + API + notifications unaffected.
  blitzpool-payout:
    <<: *blitzpool-app
    container_name: blitzpool-payout
    environment:
      - BLITZPOOL_ROLES=payout,stats
      - RUST_LOG=${RUST_LOG:-info,blitzpool=debug,bp_pplns_engine=debug,bp_group_solo_engine=debug}
      - RUST_BACKTRACE=1
    # No published ports — internal accounting only (reads/writes PG + Redis).
    volumes:
      - "../.local/${BLITZPOOL_CONFIG:-blitzpool.toml}:/app/blitzpool.toml:ro"
      - "./data/blitzpool-logs:/app/logs"
      - "../.local:/app/keys:ro"

  # Notifications: dispatcher (FCM / Web-Push / Telegram / ntfy), command
  # listeners, push/digest crons, and the notify-only fan-out of the
  # block-found + device-status streams. Recreate for a notification fix —
  # payout (PPLNS), miners, and API all stay up.
  blitzpool-notify:
    <<: *blitzpool-app
    container_name: blitzpool-notify
    environment:
      - BLITZPOOL_ROLES=notify
      - RUST_LOG=${RUST_LOG:-info,blitzpool=debug,bp_notifications=debug}
      - RUST_BACKTRACE=1
    # No published ports — talks to PG + Redis + outbound push/Telegram/ntfy.
    volumes:
      - "../.local/${BLITZPOOL_CONFIG:-blitzpool.toml}:/app/blitzpool.toml:ro"
      - "./data/blitzpool-logs:/app/logs"
      - "../.local:/app/keys:ro"

networks:
  blitzpool:
    name: blitzpool

volumes:
  ipc:
    # Only one bitcoin-<network> service can hold the socket at a
    # time. `down` clears the volume; `up` repopulates it via the
    # new bitcoin container.
    name: blitzpool-ipc
