# Bitcoin Core 31 — mainnet config for blitzpool-rust.
#
# blitzpool-rust talks to bitcoind over TDP (Template Distribution
# Protocol) via the Unix IPC socket bound by the entrypoint flag
# `-ipcbind=unix:/ipc/node.sock`. With TDP the pool negotiates
# `CoinbaseOutputConstraints.max_additional_size` per-template
# (computed from `pplns.coinbase_weight_budget` in blitzpool.toml
# via bin/blitzpool::boot::coinbase_constraints_from_pplns_budget),
# so the legacy `getblocktemplate`-era settings
# (`blockmaxweight`, `blockreservedweight`) do not apply — leave
# bitcoind on its defaults for that.

minrelaytxfee=0.00000100
incrementalrelayfee=0.00001000
mempoolfullrbf=1

# Pruned storage — set to 0 for an archival node, or to a size in MiB.
# 550 = ~550 MiB blocks kept = the spec'd minimum prune target.
prune=550

# P2P
maxconnections=30

# RPC — exposed inside the docker network for one-shot calls
# (submit_block, getblockchaininfo). The high-throughput template
# stream runs over IPC, not RPC.
rpcallowip=172.16.0.0/12
rpcallowip=127.0.0.1
rpcbind=0.0.0.0
rpcport=8332
rpcuser=bitcoin
rpcpassword=bitcoin
server=1

# Optional ZeroMQ raw-block feed for external monitoring tooling.
# blitzpool-rust does not consume ZMQ (TDP supersedes it).
zmqpubrawblock=tcp://0.0.0.0:28332
