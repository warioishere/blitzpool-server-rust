# Bitcoin Core 31 — regtest config for blitzpool-rust.
#
# blitzpool-rust speaks TDP over /ipc/node.sock — the
# `CoinbaseOutputConstraints` are negotiated per-template, so the
# legacy `blockmaxweight` / `blockreservedweight` knobs don't apply
# here. Defaults are fine.

[regtest]
rpcallowip=172.16.0.0/12
rpcallowip=127.0.0.1
rpcbind=0.0.0.0
rpcport=18443
rpcuser=bitcoin
rpcpassword=bitcoin

# Discovery / listen off — regtest stays isolated.
listen=0
discover=0
dnsseed=0

fallbackfee=0.0001
