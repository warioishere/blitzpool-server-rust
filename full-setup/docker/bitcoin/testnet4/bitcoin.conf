# Bitcoin Core 31 — testnet4 config for blitzpool-rust.
#
# Same TDP-over-IPC model as mainnet — see mainnet/bitcoin.conf
# for the rationale on omitting `blockmaxweight` /
# `blockreservedweight` (negotiated per-template via TDP).

[testnet4]
rpcallowip=172.16.0.0/12
rpcallowip=127.0.0.1
rpcbind=0.0.0.0
rpcport=48332
rpcuser=bitcoin
rpcpassword=bitcoin

minrelaytxfee=0.00000100
mempoolfullrbf=1
prune=550
maxconnections=30
zmqpubrawblock=tcp://0.0.0.0:28332
